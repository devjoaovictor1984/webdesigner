<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clima no Brasil 🌤️</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    
    <div class="painel">
        <h1>🌎 Clima no Brasil</h1>

        <div class="busca">
            <input type="text" id="cidade" placeholder="Digite a cidade (ex: Juiz de Fora)">
            <button id="buscar">Buscar</button>
        </div>

        <div id="resultado" class="card">
            <p>Digite uma cidade e clique em <b>Buscar</b>.</p>
        </div>

    </div>

    <footer>Desenvolvido com 💛 usando o jQuery + OpenWeather</footer>

    <script src="js/script.js"></script>

</body>
</html>
