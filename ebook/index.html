<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Jogo do Clique Rápido</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="game">
    <h1>Jogo do Clique Rápido</h1>
    <p>Clique no botão o máximo de vezes antes do tempo acabar.</p>

    <div class="info">
      <span>Pontos: <strong id="score">0</strong></span>
      <span>Tempo: <strong id="time">10</strong>s</span>
    </div>

    <button id="btn">CLIQUE AQUI</button>

    <button id="start">Iniciar Jogo</button>
  </div>

  <script src="js/script.js"></script>
</body>
</html>
